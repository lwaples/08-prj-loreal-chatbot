<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
  <header class="site-header">
    <img
        src="img/loreal-logo.png"
        alt="L'Oréal Logo"
        class="logo">

    <h1 class="site-title">
        L'Oréal Beauty Advisor
    </h1>

    <p class="tagline">
        Personalized skincare, makeup, and haircare recommendations.
    </p>
</header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div id="latestQuestion" class="latest-question"></div>

          <div id="chatWindow" class="chat-window">
            <!-- messages -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
  <footer class="site-footer">
    <p>&copy; 2026 L'Oréal. Educational Project.</p>
    <nav>
        <a href="https://www.loreal.com" target="_blank">
            L'Oréal </a>

        <a href="https://www.loreal.com/en/privacy-policy/" target="_blank">
            Privacy </a>

        <a href="https://www.loreal.com/en/contact-us/" target="_blank">
            Contact
        </a>
    </nav>
  </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
